name: build and test

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore aclearningutil.sln
      - name: Build
        run: dotnet build aclearningutil.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test aclearningutil.sln --no-build --configuration Release --verbosity normal
